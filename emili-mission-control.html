<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emili Zaremba — Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

/* ── RESET & BASE ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Backgrounds */
  --bg-primary:    #0A0E1A;
  --bg-secondary:  #111827;
  --bg-elevated:   #1A2035;

  /* Phase colors */
  --phase1-from: #3B82F6; --phase1-to: #60A5FA;
  --phase2-from: #8B5CF6; --phase2-to: #A78BFA;
  --phase3-from: #F59E0B; --phase3-to: #FBBF24;
  --phase4-from: #10B981; --phase4-to: #34D399;

  /* Status */
  --status-pending:  #4B5563;
  --status-done:     #10B981;
  --status-blocked:  #EF4444;

  /* Text */
  --text-primary:   #F9FAFB;
  --text-secondary: #9CA3AF;
  --text-muted:     #6B7280;

  /* Radius */
  --r-sm: 6px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-full: 9999px;

  /* Layout */
  --header-h: 124px;
  --sidebar-w: 200px;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER GLOBAL ────────────────────────────────────────── */
#global-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(10, 14, 26, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 14px 24px 12px;
}

.header-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 8px;
  flex-wrap: wrap;
  gap: 4px;
}

.header-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-primary);
}

.header-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
}

.header-stats {
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 10px;
}

.header-stats span {
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-primary);
  font-weight: 500;
}

.phase-bars-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.phase-bar-item {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.04);
  border-radius: var(--r-sm);
  padding: 4px 8px;
  min-width: 120px;
}

.phase-bar-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  white-space: nowrap;
}

.phase-bar-track {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: var(--r-full);
  overflow: hidden;
  min-width: 40px;
}

.phase-bar-fill {
  height: 100%;
  border-radius: var(--r-full);
  width: 0%;
  transition: width 0.6s ease-out;
}

.phase-bar-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* Revenue timeline */
.revenue-timeline {
  display: flex;
  align-items: center;
  gap: 0;
  font-size: 10px;
  color: var(--text-muted);
  overflow: hidden;
}

.rev-milestone {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-width: 80px;
}

.rev-amount {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-secondary);
}

.rev-week {
  font-size: 9px;
  color: var(--text-muted);
}

.rev-line {
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.1);
  position: relative;
  min-width: 20px;
}

.rev-line::after {
  content: '›';
  position: absolute;
  right: -4px;
  top: -7px;
  font-size: 10px;
  color: rgba(255,255,255,0.15);
}

/* ── LAYOUT WRAPPER ───────────────────────────────────────── */
#app {
  display: flex;
  padding-top: var(--header-h);
  min-height: 100vh;
}

/* ── SIDEBAR TIMELINE ─────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  position: sticky;
  top: var(--header-h);
  height: calc(100vh - var(--header-h));
  overflow-y: auto;
  padding: 32px 16px 32px 24px;
  display: flex;
  flex-direction: column;
  gap: 0;
  scrollbar-width: none;
}

#sidebar::-webkit-scrollbar { display: none; }

.timeline-inner {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.timeline-line {
  position: absolute;
  left: 19px;
  top: 40px;
  bottom: 40px;
  width: 1px;
  background: rgba(255,255,255,0.08);
}

.timeline-node {
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  cursor: pointer;
  padding: 0 0 36px 0;
  transition: opacity 0.2s;
}

.timeline-node:last-child { padding-bottom: 0; }

.timeline-node:hover { opacity: 0.85; }

.node-circle {
  width: 40px;
  height: 40px;
  min-width: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  border: 2px solid;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  z-index: 1;
  background: var(--bg-primary);
}

.node-circle.active {
  background: var(--node-color, var(--phase1-from));
  border-color: var(--node-color, var(--phase1-from));
  color: white;
  box-shadow: 0 0 0 4px rgba(var(--node-rgb), 0.15);
}

.node-circle.done {
  background: var(--status-done);
  border-color: var(--status-done);
  color: white;
}

.node-circle.inactive {
  border-color: rgba(255,255,255,0.12);
  color: var(--text-muted);
}

.node-info {
  flex: 1;
  padding-top: 4px;
}

.node-phase-name {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  line-height: 1.2;
  margin-bottom: 2px;
}

.node-weeks {
  font-size: 10px;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.node-progress-track {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.07);
  border-radius: var(--r-full);
  overflow: hidden;
}

.node-progress-fill {
  height: 100%;
  border-radius: var(--r-full);
  width: 0%;
  transition: width 0.6s ease-out;
}

/* ── MAIN CONTENT ─────────────────────────────────────────── */
#main-content {
  flex: 1;
  padding: 32px 32px 80px 24px;
  max-width: 960px;
}

/* ── PHASE SECTION ────────────────────────────────────────── */
.phase-section {
  margin-bottom: 80px;
}

.phase-header {
  border-radius: var(--r-lg);
  padding: 24px 32px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}

.phase-header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.phase-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
}

.phase-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.phase-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.phase-op-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-secondary);
}

.phase-name {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}

.phase-subtitle {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 16px;
}

.phase-progress-track {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.07);
  border-radius: var(--r-full);
  overflow: hidden;
}

.phase-progress-fill {
  height: 100%;
  border-radius: var(--r-full);
  width: 0%;
  transition: width 0.6s ease-out;
}

.phase-progress-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  text-align: right;
  margin-top: 6px;
}

/* ── OPS GRID ─────────────────────────────────────────────── */
.ops-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

/* ── OP CARD ──────────────────────────────────────────────── */
.op-card {
  background: rgba(17, 24, 39, 0.7);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: var(--r-md);
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  animation: cardFadeIn 0.4s ease-out both;
}

@keyframes cardFadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.op-card:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.12);
}

.op-card.doing {
  border-left: 3px solid var(--phase-color);
}

.op-card.done {
  opacity: 0.6;
}

.op-card.blocked {
  border: 1px solid rgba(239, 68, 68, 0.3);
}

/* Card shake animation */
@keyframes cardShake {
  0%   { transform: translateX(0); }
  25%  { transform: translateX(-2px); }
  75%  { transform: translateX(2px); }
  100% { transform: translateX(0); }
}

.op-card.shaking {
  animation: cardShake 0.2s ease-in-out;
}

/* Card header row */
.card-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}

.status-circle {
  width: 12px;
  height: 12px;
  min-width: 12px;
  border-radius: 50%;
  margin-top: 3px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  z-index: 2;
}

.status-circle.ready {
  border: 2px solid var(--status-pending);
  background: transparent;
}

.status-circle.doing {
  background: var(--phase-color);
  border: 2px solid var(--phase-color);
  animation: statusPulse 2s infinite;
}

.status-circle.done {
  background: var(--status-done);
  border: 2px solid var(--status-done);
}

.status-circle.blocked {
  background: var(--status-blocked);
  border: 2px solid var(--status-blocked);
}

@keyframes statusPulse {
  0%, 100% { box-shadow: 0 0 0 0 var(--pulse-color, rgba(59,130,246,0.4)); }
  50%       { box-shadow: 0 0 0 6px rgba(59,130,246,0); }
}

.card-meta {
  flex: 1;
  min-width: 0;
}

.card-top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
  gap: 8px;
}

.op-code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
}

.time-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  background: rgba(255,255,255,0.06);
  border-radius: var(--r-full);
  padding: 2px 8px;
  color: var(--text-muted);
  white-space: nowrap;
}

.card-title {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.4;
  margin-bottom: 8px;
  position: relative;
  display: inline-block;
  width: 100%;
}

.card-title.strikethrough::after {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  height: 1px;
  background: var(--text-muted);
  width: 0%;
  transition: width 0.3s ease-out;
}

.card-title.strikethrough.animated::after {
  width: 100%;
}

.card-bottom-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.card-assignees {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.status-badge {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 2px 8px;
  border-radius: var(--r-full);
  white-space: nowrap;
  text-transform: uppercase;
}

.status-badge.ready    { background: rgba(75,85,99,0.3); color: #9CA3AF; }
.status-badge.doing    { background: rgba(var(--phase-rgb), 0.2); color: var(--phase-color); }
.status-badge.done     { background: rgba(16,185,129,0.2); color: #34D399; }
.status-badge.blocked  { background: rgba(239,68,68,0.2); color: #F87171; }

/* ── CARD EXPANDED ────────────────────────────────────────── */
.card-expanded {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

.card-expanded.open {
  max-height: 600px;
  opacity: 1;
}

.card-expanded-inner {
  border-top: 1px solid rgba(255,255,255,0.06);
  margin-top: 16px;
  padding-top: 16px;
}

.expand-section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}

.expand-description {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.6;
  margin-bottom: 16px;
}

/* Checklist */
.checklist {
  list-style: none;
  margin-bottom: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.checklist-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: color 0.15s;
}

.checklist-item:hover { color: var(--text-primary); }

.checklist-check {
  width: 14px;
  height: 14px;
  min-width: 14px;
  border-radius: var(--r-sm);
  border: 1px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  font-size: 9px;
}

.checklist-item.checked .checklist-check {
  background: var(--status-done);
  border-color: var(--status-done);
  color: white;
}

.checklist-item.checked .checklist-text {
  text-decoration: line-through;
  color: var(--text-muted);
}

/* Dependency */
.dependency-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r-sm);
  padding: 3px 8px;
  color: var(--text-secondary);
  margin-right: 4px;
  margin-bottom: 12px;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.15s;
}

.dependency-tag:hover { background: rgba(255,255,255,0.09); }

/* Notes textarea */
.notes-textarea {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--r-md);
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  line-height: 1.5;
  padding: 10px 12px;
  resize: vertical;
  min-height: 60px;
  outline: none;
  transition: border-color 0.15s;
  margin-bottom: 14px;
}

.notes-textarea:focus {
  border-color: rgba(255,255,255,0.15);
}

.notes-textarea::placeholder { color: var(--text-muted); }

/* Action buttons */
.card-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.action-btn {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 6px 14px;
  border-radius: var(--r-full);
  border: none;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Inter', sans-serif;
}

.action-btn.start   { background: rgba(var(--phase-rgb),0.2); color: var(--phase-color); }
.action-btn.done    { background: rgba(16,185,129,0.2); color: #34D399; }
.action-btn.block   { background: rgba(239,68,68,0.15); color: #F87171; }
.action-btn.reopen  { background: rgba(75,85,99,0.3); color: #9CA3AF; }

.action-btn:hover { filter: brightness(1.2); transform: scale(1.02); }

/* ── MOBILE HORIZONTAL TIMELINE ───────────────────────────── */
#mobile-timeline {
  display: none;
  overflow-x: auto;
  padding: 12px 16px;
  background: rgba(10,14,26,0.8);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  gap: 8px;
  scrollbar-width: none;
}

#mobile-timeline::-webkit-scrollbar { display: none; }

.mobile-node {
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  cursor: pointer;
  padding: 6px 12px;
  border-radius: var(--r-full);
  border: 1px solid rgba(255,255,255,0.08);
  transition: all 0.2s;
  background: rgba(255,255,255,0.03);
}

.mobile-node.active {
  background: rgba(var(--node-rgb),0.15);
  border-color: var(--node-color);
}

.mobile-node-circle {
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  border: 1.5px solid;
}

.mobile-node-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
}

/* ── SCROLLBAR GLOBAL ─────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* ── RESPONSIVE ───────────────────────────────────────────── */
@media (max-width: 768px) {
  :root {
    --header-h: 160px;
    --sidebar-w: 0px;
  }

  #sidebar { display: none; }
  #mobile-timeline { display: flex; }

  #app { flex-direction: column; padding-top: calc(var(--header-h) + 52px); }

  #main-content { padding: 20px 16px 60px; }

  .ops-grid { grid-template-columns: 1fr; }

  .phase-header { padding: 16px 20px; }

  .revenue-timeline { display: none; }

  .phase-bars-row { gap: 4px; }
  .phase-bar-item { min-width: auto; padding: 3px 6px; }
}

/* ── TOOLTIP FOR STATUS ───────────────────────────────────── */
.status-tooltip {
  position: fixed;
  background: var(--bg-elevated);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--r-md);
  padding: 8px 12px;
  font-size: 11px;
  color: var(--text-secondary);
  pointer-events: none;
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.15s;
  white-space: nowrap;
}

.status-tooltip.visible { opacity: 1; }

/* ── NODE PULSE (one-shot on nav click) ───────────────────── */
@keyframes nodePulseOnce {
  0%   { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); }
  50%  { box-shadow: 0 0 0 8px rgba(255,255,255,0); }
  100% { box-shadow: none; }
}
.node-circle.pulsed { animation: nodePulseOnce 0.5s ease-out; }

/* Empty notes placeholder */
.notes-empty {
  font-size: 11px;
  color: var(--text-muted);
  font-style: italic;
}
</style>
</head>
<body>

<!-- ── HEADER ───────────────────────────────────────────────── -->
<header id="global-header">
  <div class="header-top">
    <div>
      <div class="header-title">EMILI ZAREMBA — PLANO 90 DIAS</div>
      <div class="header-stats">
        <span>@emilizaremba</span> · <span>28.8K</span> seguidores · <span>8.61%</span> eng
      </div>
    </div>
    <div class="header-meta" id="day-counter">Dia — de 90 · Carregando...</div>
  </div>

  <div class="phase-bars-row" id="phase-bars-row">
    <!-- injected by JS -->
  </div>

  <div class="revenue-timeline">
    <div class="rev-milestone">
      <div class="rev-amount">R$0</div>
      <div class="rev-week">Semana 1-2</div>
    </div>
    <div class="rev-line"></div>
    <div class="rev-milestone">
      <div class="rev-amount" style="color:#60A5FA">R$500</div>
      <div class="rev-week">Semana 3-4</div>
    </div>
    <div class="rev-line"></div>
    <div class="rev-milestone">
      <div class="rev-amount" style="color:#FBBF24">R$2.000</div>
      <div class="rev-week">Semana 5-8</div>

// ── STATE ─────────────────────────────────────────────────────
const STORAGE_KEY = 'emili-ops-state';
let state = {};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch(e) { state = {}; }
  // Fill defaults
  Object.keys(OPS).forEach(id => {
    if (!state[id]) {
      state[id] = { status: 'ready', notes: '', checklist: {}, startedAt: null, completedAt: null };
    }
    if (!state[id].checklist) state[id].checklist = {};
  });
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ── HELPERS ───────────────────────────────────────────────────
function getPhaseForOp(opId) {
  return PHASES.find(p => p.ops.includes(opId));
}

function getPhaseProgress(phase) {
  const done = phase.ops.filter(id => state[id] && state[id].status === 'done').length;
  return { done, total: phase.ops.length, pct: Math.round((done / phase.ops.length) * 100) };
}

function cycleStatus(opId) {
  const cur = state[opId].status;
  if (cur === 'ready')  return 'doing';
  if (cur === 'doing')  return 'done';
  if (cur === 'done')   return 'ready';
  if (cur === 'blocked') return 'ready';
  return 'ready';
}

function setStatus(opId, newStatus) {
  const now = new Date().toISOString();
  if (newStatus === 'doing' && !state[opId].startedAt) state[opId].startedAt = now;
  if (newStatus === 'done')  state[opId].completedAt = now;
  if (newStatus === 'ready') { state[opId].startedAt = null; state[opId].completedAt = null; }
  state[opId].status = newStatus;
  saveState();
  renderCard(opId);
  updateProgress();
}

// ── RENDER UTILS ──────────────────────────────────────────────
function statusLabel(s) {
  return { ready:'ready', doing:'doing', done:'done', blocked:'blocked' }[s] || s;
}

function circleIcon(status) {
  if (status === 'done')    return '✓';
  if (status === 'blocked') return '✕';
  return '';
}

function actionButtons(opId) {
  const s = state[opId].status;
  const phase = getPhaseForOp(opId);
  const pc = phase.colorFrom;
  const pr = phase.rgb;
  let btns = [];
  if (s === 'ready')   btns = [
    `<button class="action-btn start" style="--phase-color:${pc};--phase-rgb:${pr}" onclick="event.stopPropagation();setStatus('${opId}','doing')">▶ Iniciar</button>`,
    `<button class="action-btn block" onclick="event.stopPropagation();setStatus('${opId}','blocked')">⊘ Bloquear</button>`
  ];
  if (s === 'doing')   btns = [
    `<button class="action-btn done" onclick="event.stopPropagation();setStatus('${opId}','done')">✓ Concluir</button>`,
    `<button class="action-btn block" onclick="event.stopPropagation();setStatus('${opId}','blocked')">⊘ Bloquear</button>`
  ];
  if (s === 'done')    btns = [
    `<button class="action-btn reopen" onclick="event.stopPropagation();setStatus('${opId}','ready')">↺ Reabrir</button>`
  ];
  if (s === 'blocked') btns = [
    `<button class="action-btn reopen" onclick="event.stopPropagation();setStatus('${opId}','ready')">↺ Desbloquear</button>`,
    `<button class="action-btn done" onclick="event.stopPropagation();setStatus('${opId}','done')">✓ Concluir</button>`
  ];
  return btns.join('');
}

// ── RENDER CARD ───────────────────────────────────────────────
function renderCard(opId) {
  const el = document.getElementById(`card-${opId}`);
  if (!el) return;
  const op = OPS[opId];
  const s = state[opId];
  const phase = getPhaseForOp(opId);
  const pc = phase.colorFrom;
  const pr = phase.rgb;
  const expanded = el.classList.contains('expanded');

  // Card classes
  el.className = `op-card ${s.status}`;
  el.style.setProperty('--phase-color', pc);
  el.style.setProperty('--phase-rgb', pr);
  el.style.setProperty('--pulse-color', `rgba(${pr},0.4)`);

  // Status circle
  const circle = el.querySelector('.status-circle');
  if (circle) {
    circle.className = `status-circle ${s.status}`;
    circle.style.setProperty('--phase-color', pc);
    circle.textContent = circleIcon(s.status);
  }

  // Status badge
  const badge = el.querySelector('.status-badge');
  if (badge) {
    badge.className = `status-badge ${s.status}`;
    badge.style.setProperty('--phase-color', pc);
    badge.style.setProperty('--phase-rgb', pr);
    badge.textContent = statusLabel(s.status);
  }

  // Title strikethrough
  const titleEl = el.querySelector('.card-title');
  if (titleEl) {
    if (s.status === 'done') {
      titleEl.classList.add('strikethrough');
      requestAnimationFrame(() => titleEl.classList.add('animated'));
    } else {
      titleEl.classList.remove('strikethrough','animated');
    }
  }

  // Card opacity for done
  el.style.opacity = s.status === 'done' ? '0.6' : '1';

  // Expand
  if (expanded) {
    const expDiv = el.querySelector('.card-expanded');
    if (expDiv) expDiv.classList.add('open');
    el.classList.add('expanded');
  }

  // Rebuild action buttons
  const actionsEl = el.querySelector('.card-actions');
  if (actionsEl) actionsEl.innerHTML = actionButtons(opId);
}

// ── BUILD CARD HTML ───────────────────────────────────────────
function buildCardHTML(opId, i) {
  const op = OPS[opId];
  const s = state[opId];
  const phase = getPhaseForOp(opId);
  const pc = phase.colorFrom;
  const pr = phase.rgb;

  const checklistHTML = op.tasks.map((task, ti) => {
    const key = `${ti}`;
    const checked = s.checklist[key] ? 'checked' : '';
    return `<li class="checklist-item ${checked}" 
      onclick="event.stopPropagation();toggleTask('${opId}',${ti},this)">
      <div class="checklist-check">${checked ? '✓' : ''}</div>
      <span class="checklist-text">${task}</span>
    </li>`;
  }).join('');

  const depsHTML = op.deps.length
    ? `<div style="margin-bottom:12px"><div class="expand-section-label">Dependências</div>
        ${op.deps.map(d => `<a class="dependency-tag" href="#card-${d}" onclick="event.stopPropagation();scrollToOp('${d}')">${d}</a>`).join('')}
       </div>`
    : '';

  const noteVal = (s.notes || '').replace(/"/g,'&quot;');

  return `
<div class="op-card ${s.status}" 
     id="card-${opId}"
     style="--phase-color:${pc};--phase-rgb:${pr};--pulse-color:rgba(${pr},0.4);
            animation-delay:calc(${i} * 0.05s); opacity:${s.status==='done'?'0.6':'1'}"
     onclick="toggleCard('${opId}')">

  <div class="card-header">
    <div class="status-circle ${s.status}" 
         style="--phase-color:${pc}"
         onclick="event.stopPropagation();handleCircleClick('${opId}',this)"
         title="Clique para avançar status">
      ${circleIcon(s.status)}
    </div>
    <div class="card-meta">
      <div class="card-top-row">
        <span class="op-code" style="color:${pc}">${opId}</span>
        <span class="time-badge">${op.time}</span>
      </div>
      <div class="card-title ${s.status==='done'?'strikethrough animated':''}">${op.title}</div>
      <div class="card-bottom-row">
        <span class="card-assignees">${op.assignees}</span>
        <span class="status-badge ${s.status}" 
              style="--phase-color:${pc};--phase-rgb:${pr}">
          ${statusLabel(s.status)}
        </span>
      </div>
    </div>
  </div>

  <div class="card-expanded" id="expanded-${opId}">
    <div class="card-expanded-inner">

      <div class="expand-section-label">Objetivo</div>
      <div class="expand-description">${op.objective}</div>

      <div class="expand-section-label">Processo</div>
      <div class="expand-description">${op.process}</div>

      <div class="expand-section-label">Critério de Sucesso</div>
      <div class="expand-description" style="margin-bottom:16px">${op.criterion}</div>

      <div class="expand-section-label">Sub-tarefas</div>
      <ul class="checklist">${checklistHTML}</ul>

      ${depsHTML}

      <div class="expand-section-label">Notas</div>
      <textarea class="notes-textarea" 
        placeholder="Anotações, bloqueios, links..." 
        onclick="event.stopPropagation()"
        onchange="saveNotes('${opId}',this.value)"
        oninput="saveNotes('${opId}',this.value)">${noteVal}</textarea>

      <div class="card-actions">
        ${actionButtons(opId)}
      </div>

    </div>
  </div>
</div>`;
}

// ── INTERACTIONS ──────────────────────────────────────────────
function toggleCard(opId) {
  const card = document.getElementById(`card-${opId}`);
  const exp  = document.getElementById(`expanded-${opId}`);
  if (!card || !exp) return;
  const isOpen = exp.classList.contains('open');
  exp.classList.toggle('open', !isOpen);
  card.classList.toggle('expanded', !isOpen);
}

function handleCircleClick(opId, circleEl) {
  const card = document.getElementById(`card-${opId}`);
  // Shake
  card.classList.remove('shaking');
  void card.offsetWidth;
  card.classList.add('shaking');
  card.addEventListener('animationend', () => card.classList.remove('shaking'), { once: true });
  // After shake, update
  setTimeout(() => {
    const next = cycleStatus(opId);
    setStatus(opId, next);
  }, 150);
}

function toggleTask(opId, idx, liEl) {
  if (!state[opId].checklist) state[opId].checklist = {};
  const key = String(idx);
  const wasChecked = !!state[opId].checklist[key];
  state[opId].checklist[key] = !wasChecked;
  saveState();
  liEl.classList.toggle('checked', !wasChecked);
  const check = liEl.querySelector('.checklist-check');
  if (check) check.textContent = !wasChecked ? '✓' : '';
}

function saveNotes(opId, val) {
  state[opId].notes = val;
  saveState();
}

function scrollToOp(opId) {
  const el = document.getElementById(`card-${opId}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ── UPDATE PROGRESS (after state changes) ─────────────────────
function updateProgress() {
  PHASES.forEach(phase => {
    const { done, total, pct } = getPhaseProgress(phase);
    // Header bars
    const hfill = document.getElementById(`hpfill-${phase.id}`);
    const hcount = document.getElementById(`hpcount-${phase.id}`);
    if (hfill) hfill.style.width = pct + '%';
    if (hcount) hcount.textContent = `${done}/${total}`;
    // Phase progress bars
    const pfill = document.getElementById(`ppfill-${phase.id}`);
    const ppct  = document.getElementById(`pppct-${phase.id}`);
    const pcount= document.getElementById(`popcount-${phase.id}`);
    if (pfill) pfill.style.width = pct + '%';
    if (ppct)  ppct.innerHTML = `<span style="font-family:'JetBrains Mono',monospace">${pct}%</span>`;
    if (pcount) pcount.textContent = `${done}/${total} OPs`;
    // Sidebar node fills
    const nfill = document.getElementById(`npfill-${phase.id}`);
    if (nfill) nfill.style.width = pct + '%';
    // Sidebar node circle state
    const ncircle = document.getElementById(`ncircle-${phase.id}`);
    if (ncircle) {
      ncircle.className = 'node-circle';
      if (done === total && total > 0) {
        ncircle.classList.add('done');
        ncircle.textContent = '✓';
      } else {
        ncircle.classList.add('inactive');
        ncircle.textContent = phase.id;
        ncircle.style.borderColor = phase.colorFrom + '40';
        ncircle.style.color = phase.colorFrom;
      }
    }
  });

  // Active phase display
  updateDayCounter();
}

function updateDayCounter() {
  // Find the active phase (first with any "doing" status, or first not done)
  let activePhase = PHASES.find(p => p.ops.some(id => state[id].status === 'doing'))
    || PHASES.find(p => getPhaseProgress(p).done < getPhaseProgress(p).total)
    || PHASES[3];

  const el = document.getElementById('day-counter');
  // Static for now (no start date stored) — show active phase
  el.textContent = `Fase ${activePhase.id} ativa · ${activePhase.weeks}`;

  // Highlight active node
  PHASES.forEach(p => {
    const nc = document.getElementById(`ncircle-${p.id}`);
    const mn = document.getElementById(`mnode-${p.id}`);
    if (!nc) return;
    const prog = getPhaseProgress(p);
    if (prog.done === prog.total && prog.total > 0) {
      // done state already set above
    } else if (p.id === activePhase.id) {
      nc.className = 'node-circle active';
      nc.style.setProperty('--node-color', p.colorFrom);
      nc.style.setProperty('--node-rgb', p.rgb);
      nc.style.background = p.colorFrom;
      nc.style.borderColor = p.colorFrom;
      nc.style.color = 'white';
      nc.style.boxShadow = `0 0 0 4px rgba(${p.rgb},0.15)`;
      nc.textContent = p.id;
    }
    if (mn) {
      mn.classList.toggle('active', p.id === activePhase.id);
    }
  });
}

// ── TIMELINE NAVIGATION ───────────────────────────────────────
function navToPhase(phaseId) {
  const section = document.getElementById(`phase-${phaseId}`);
  if (!section) return;
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
  // Pulse node
  const nc = document.getElementById(`ncircle-${phaseId}`);
  if (nc) {
    nc.classList.add('pulsed');
    nc.addEventListener('animationend', () => nc.classList.remove('pulsed'), { once: true });
  }
}

// ── INTERSECTION OBSERVER (sidebar highlight) ──────────────────
function initIntersectionObserver() {
  const sections = document.querySelectorAll('.phase-section');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const pid = parseInt(entry.target.dataset.phase);
        highlightNode(pid);
      }
    });
  }, { rootMargin: '-20% 0px -60% 0px', threshold: 0 });
  sections.forEach(s => observer.observe(s));
}

function highlightNode(activeId) {
  PHASES.forEach(p => {
    const nc = document.getElementById(`ncircle-${p.id}`);
    const mn = document.getElementById(`mnode-${p.id}`);
    if (!nc) return;
    const prog = getPhaseProgress(p);
    if (p.id === activeId && !(prog.done === prog.total && prog.total > 0)) {
      nc.className = 'node-circle active';
      nc.style.background = p.colorFrom;
      nc.style.borderColor = p.colorFrom;
      nc.style.color = 'white';
      nc.style.boxShadow = `0 0 0 4px rgba(${p.rgb},0.15)`;
      nc.textContent = p.id;
    } else if (prog.done === prog.total && prog.total > 0) {
      nc.className = 'node-circle done';
      nc.textContent = '✓';
    } else {
      nc.className = 'node-circle inactive';
      nc.style.background = 'var(--bg-primary)';
      nc.style.borderColor = p.colorFrom + '40';
      nc.style.color = p.colorFrom;
      nc.style.boxShadow = 'none';
      nc.textContent = p.id;
    }
    if (mn) mn.classList.toggle('active', p.id === activeId);
  });
}

// ── ANIMATE PROGRESS BARS ON LOAD ────────────────────────────
function animateProgressBars() {
  PHASES.forEach(phase => {
    const { pct } = getPhaseProgress(phase);
    ['hpfill','ppfill','npfill'].forEach(prefix => {
      const el = document.getElementById(`${prefix}-${phase.id}`);
      if (el) {
        el.style.width = '0%';
        requestAnimationFrame(() => {
          setTimeout(() => { el.style.width = pct + '%'; }, 100);
        });
      }
    });
  });
}

// ── INIT ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadState();
  renderAll();
  setTimeout(animateProgressBars, 150);
});
</script>
</body>
</html>
